name: workshop

on:
  push:
    branches:
      - main

jobs:
  workshop:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: build
        shell: cmd
        run: |
          ./scripts/build.bat

      - name: publish
        shell: cmd
        run: |
          7z a -t7z workshop-${{ github.run_id }}.7z ./release/*